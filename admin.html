<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#08080f">
<title>⚙️ Admin — México vs Corea</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --oro:#ffd600;--oro2:#ffab00;
  --verde:#00c853;--verde2:#00e676;
  --rojo:#ff1744;--rl:#ff5252;
  --azul:#2979ff;
  --negro:#08080f;--g1:#0f0f18;--g2:#16161f;--g3:#1e1e2a;
  --borde:rgba(255,255,255,.09);
  --text-dim:rgba(255,255,255,.45);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--negro);color:#fff;overflow:hidden}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:240px;flex-shrink:0;
  background:var(--g1);
  border-right:1px solid var(--borde);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sb-logo{
  padding:22px 20px 16px;
  border-bottom:1px solid var(--borde);
  display:flex;flex-direction:column;gap:4px;
}
.sb-title{font-family:'Bebas Neue';font-size:20px;color:var(--oro);letter-spacing:2px}
.sb-sub{font-size:11px;color:var(--text-dim);letter-spacing:.5px}
.live-badge{
  display:inline-flex;align-items:center;gap:6px;margin-top:8px;
  background:rgba(255,23,68,.15);border:1px solid rgba(255,23,68,.4);
  padding:5px 10px;border-radius:50px;width:fit-content;
}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--rojo);animation:lp 1.2s ease-in-out infinite}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.3}}
.live-badge span{font-size:11px;font-weight:700;color:var(--rojo);letter-spacing:1px}

.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-btn{
  display:flex;align-items:center;gap:12px;width:100%;
  padding:12px 14px;border-radius:12px;border:none;
  background:none;color:rgba(255,255,255,.55);
  font-size:14px;font-weight:600;cursor:pointer;
  transition:all .18s;text-align:left;
  margin-bottom:4px;
}
.nav-btn .ico{font-size:18px;width:22px;text-align:center}
.nav-btn:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-btn.a{background:rgba(255,214,0,.1);color:var(--oro);border:1px solid rgba(255,214,0,.2)}

.sb-footer{padding:14px 16px;border-top:1px solid var(--borde)}
.sb-user{font-size:12px;color:var(--text-dim);margin-bottom:8px;word-break:break-all}
.btn-out{
  width:100%;padding:10px;border-radius:10px;
  background:rgba(255,23,68,.1);border:1px solid rgba(255,23,68,.25);
  color:var(--rojo);font-size:13px;font-weight:600;cursor:pointer;
  transition:all .18s;
}
.btn-out:hover{background:rgba(255,23,68,.2)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Top bar */
.topbar{
  flex-shrink:0;padding:16px 24px;
  border-bottom:1px solid var(--borde);
  background:rgba(15,15,24,.8);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
.topbar-title{font-family:'Bebas Neue';font-size:24px;letter-spacing:2px;color:#fff}
.topbar-right{display:flex;gap:8px;align-items:center}

/* Panels */
.panel{display:none;flex:1;overflow-y:auto;padding:22px 24px}
.panel.on{display:block}
.panel-title{font-family:'Bebas Neue';font-size:26px;letter-spacing:2px;color:var(--oro);margin-bottom:18px}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 18px;border-radius:12px;border:none;
  font-family:'Inter';font-weight:700;font-size:13px;cursor:pointer;
  transition:all .18s;-webkit-appearance:none;
}
.btn:active{transform:scale(.95)}
.btn-primary{background:linear-gradient(135deg,var(--verde),var(--verde2));color:#000}
.btn-gold{background:linear-gradient(135deg,var(--oro2),var(--oro));color:#000}
.btn-danger{background:rgba(255,23,68,.15);border:1px solid rgba(255,23,68,.3);color:var(--rojo)}
.btn-ghost{background:rgba(255,255,255,.07);border:1px solid var(--borde);color:rgba(255,255,255,.7)}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:9px}

/* ── CARDS / STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:22px}
.scard{background:var(--g2);border:1px solid var(--borde);border-radius:16px;padding:18px 16px}
.scard.hl-gold{border-color:rgba(255,214,0,.3);background:rgba(255,214,0,.06)}
.scard.hl-green{border-color:rgba(0,200,83,.3);background:rgba(0,200,83,.05)}
.scard.hl-red{border-color:rgba(255,23,68,.3);background:rgba(255,23,68,.05)}
.snum{font-family:'Bebas Neue';font-size:38px;color:var(--oro);line-height:1}
.scard.hl-green .snum{color:var(--verde2)}
.scard.hl-red .snum{color:var(--rl)}
.slbl{font-size:12px;color:var(--text-dim);margin-top:5px}

/* ── SEARCH BAR ── */
.sbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.sbar input,.sbar select{
  background:var(--g2);border:1.5px solid var(--borde);
  color:#fff;padding:10px 14px;border-radius:11px;
  font-size:14px;font-family:'Inter';outline:none;
  transition:border-color .2s;-webkit-appearance:none;
}
.sbar input{flex:1;min-width:200px}
.sbar input:focus,.sbar select:focus{border-color:var(--oro)}
.sbar select option{background:#1a1a2e}

/* ── PARTICIPANT CARDS ── */
.pc{
  background:var(--g2);border:1px solid var(--borde);
  border-radius:14px;padding:15px 16px;margin-bottom:10px;
  transition:border-color .2s;
}
.pc.win{border-color:rgba(255,214,0,.3)}
.pc.dlv{border-color:rgba(0,200,83,.4)}
.pc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.pc-name{font-weight:800;font-size:15px}
.pc-code{font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;color:var(--oro)}
.pc-info{font-size:12px;color:var(--text-dim);line-height:1.9;margin-bottom:10px}
.pc-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.pc-btn{margin-top:10px;width:100%;padding:11px;border-radius:11px;background:var(--verde);color:#000;border:none;font-size:13px;font-weight:700;cursor:pointer}
.pc-btn:disabled{background:var(--g3);color:var(--text-dim);cursor:not-allowed}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:50px;font-size:11px;font-weight:700;letter-spacing:.4px}
.badge-gold{background:rgba(255,214,0,.14);color:var(--oro)}
.badge-green{background:rgba(0,200,83,.16);color:var(--verde2)}
.badge-red{background:rgba(255,23,68,.14);color:var(--rl)}
.badge-gray{background:rgba(255,255,255,.07);color:rgba(255,255,255,.4)}
.badge-blue{background:rgba(41,121,255,.2);color:#82b4ff}

/* ── INVENTORY ── */
.inv-toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.inv-card{
  background:var(--g2);border:1px solid var(--borde);
  border-radius:16px;padding:18px;margin-bottom:10px;
}
.inv-card.inactive{opacity:.5}
.inv-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:10px}
.inv-name{font-weight:800;font-size:16px;margin-bottom:4px}
.inv-actions{display:flex;gap:6px;flex-shrink:0}
.inv-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.istat{background:var(--g3);border-radius:10px;padding:10px 6px;text-align:center}
.istat-num{font-family:'Bebas Neue';font-size:26px}
.istat-lbl{font-size:10px;color:var(--text-dim);margin-top:2px}
.prog-wrap{height:7px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin-bottom:6px}
.prog{height:100%;border-radius:4px;transition:width .4s}
.prog.green{background:linear-gradient(90deg,var(--verde),var(--verde2))}
.prog.gold{background:linear-gradient(90deg,var(--oro2),var(--oro))}
.empty-state{padding:48px 0;text-align:center;color:var(--text-dim);font-size:14px}

/* ── DASHBOARD CHART ── */
.inv-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;padding:10px 12px;background:var(--g3);border-radius:10px}
.ibr-label{width:140px;flex-shrink:0;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ibr-track{flex:1;height:10px;background:rgba(255,255,255,.08);border-radius:5px;overflow:hidden}
.ibr-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--verde),var(--oro));transition:width .5s}
.ibr-num{font-size:12px;color:var(--text-dim);min-width:60px;text-align:right;flex-shrink:0}

/* ── LOGIN ── */
#login-screen{
  position:fixed;inset:0;z-index:1000;
  background:radial-gradient(ellipse at top,#0d1f10,#050508 70%);
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.login-card{background:var(--g2);border:1px solid var(--borde);border-radius:24px;padding:36px 28px;width:100%;max-width:380px}
.login-title{font-family:'Bebas Neue';font-size:32px;color:var(--oro);letter-spacing:2px;margin-bottom:6px;text-align:center}
.login-sub{font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:24px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--verde2);margin-bottom:7px}
.fg input{width:100%;background:rgba(255,255,255,.06);border:1.5px solid var(--borde);color:#fff;padding:14px 16px;border-radius:12px;font-size:15px;font-family:'Inter';outline:none;transition:border-color .2s;-webkit-appearance:none}
.fg input:focus{border-color:var(--verde2)}
.fg input::placeholder{color:rgba(255,255,255,.25)}
.lerr{color:var(--rl);font-size:12px;margin-bottom:10px;min-height:16px;font-weight:600}
.btn-login{width:100%;padding:16px;border-radius:14px;background:linear-gradient(135deg,var(--verde),var(--verde2));color:#000;font-size:17px;font-weight:800;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:1px}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.modal-bg.on{display:flex}
.modal{background:var(--g2);border:1px solid var(--borde);border-radius:20px;padding:26px 22px;width:100%;max-width:380px;animation:su .3s ease both}
@keyframes su{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h3{font-family:'Bebas Neue';font-size:22px;color:var(--oro);margin-bottom:16px;letter-spacing:1.5px}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.modal-actions .btn{flex:1;justify-content:center}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:rgba(14,14,22,.97);color:#fff;padding:13px 22px;border-radius:14px;font-size:14px;font-weight:700;z-index:9999;transition:transform .3s;box-shadow:0 8px 36px rgba(0,0,0,.6);white-space:nowrap;pointer-events:none;border:1px solid var(--borde)}
#toast.on{transform:translateX(-50%) translateY(0)}

/* ── SPIN ── */
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── REALTIME INDICATOR ── */
.rt-badge{
  display:flex;align-items:center;gap:6px;font-size:12px;color:var(--verde2);
  background:rgba(0,200,83,.1);border:1px solid rgba(0,200,83,.25);
  padding:5px 12px;border-radius:50px;
}
.rt-dot{width:7px;height:7px;border-radius:50%;background:var(--verde2);animation:lp 1.5s ease-in-out infinite}

/* ── NEW ROW ANIM ── */
.new-row{animation:newrow .6s ease both}
@keyframes newrow{from{transform:translateX(-12px);opacity:0;background:rgba(255,214,0,.12)}to{transform:translateX(0);opacity:1}}

/* RESPONSIVE */
@media(max-width:700px){
  .sidebar{display:none}
  .topbar-title{font-size:18px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-title">⚙️ ADMIN PANEL</div>
    <div class="login-sub">México vs Corea — Dinámica de premios</div>
    <div class="fg">
      <label>Correo</label>
      <input type="email" id="au" placeholder="admin@evento.mx" autocomplete="off">
    </div>
    <div class="fg">
      <label>Contraseña</label>
      <input type="password" id="ap" placeholder="••••••••" autocomplete="off">
    </div>
    <div class="lerr" id="lerr"></div>
    <button class="btn-login" onclick="aLogin()">Entrar al Panel</button>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div class="app" id="main-app" style="display:none">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-logo">
      <div class="sb-title">⚽ ADMIN</div>
      <div class="sb-sub">México vs Corea 2026</div>
      <div class="live-badge"><div class="live-dot"></div><span>EN VIVO</span></div>
    </div>
    <div class="sb-nav">
      <button class="nav-btn a" onclick="switchTab('dash',this)"><span class="ico">📊</span> Dashboard</button>
      <button class="nav-btn" onclick="switchTab('parts',this)"><span class="ico">👥</span> Participantes</button>
      <button class="nav-btn" onclick="switchTab('inv',this)"><span class="ico">📦</span> Inventario</button>
      <button class="nav-btn" onclick="window.open('ganadores.html','_blank')"><span class="ico">🏆</span> Tablero Ganadores</button>
      <button class="nav-btn" onclick="window.open('index.html','_blank')"><span class="ico">📱</span> Ver App</button>
    </div>
    <div class="sb-footer">
      <div class="sb-user" id="sb-email">—</div>
      <button class="btn-out" onclick="aOut()">⏻ Cerrar sesión</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-right">
        <div class="rt-badge"><div class="rt-dot"></div>Tiempo real</div>
        <div id="pause-status" class="badge badge-green" style="font-size:12px;padding:7px 14px">🟢 Dinámica activa</div>
        <button class="btn btn-danger" id="btn-pause" onclick="togglePause()">⏸ Pausar dinámica</button>
        <button class="btn btn-gold" onclick="exportExcel()">📊 Excel</button>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div class="panel on" id="p-dash">
      <div class="panel-title">RESUMEN DEL EVENTO</div>
      <div class="stat-grid" id="dash-stats"></div>
      <div class="panel-title" style="font-size:18px;margin-top:8px">Inventario por tipo</div>
      <div id="dash-inv-bars"></div>
      <div class="panel-title" style="font-size:18px;margin-top:16px">Últimos ganadores</div>
      <div id="dash-recent"></div>
    </div>

    <!-- PARTICIPANTES -->
    <div class="panel" id="p-parts">
      <div class="panel-title">PARTICIPANTES</div>
      <div class="sbar">
        <input type="text" id="srch" placeholder="🔍 Buscar nombre, código, tel, correo…" oninput="renderParts()">
        <select id="filtro" onchange="renderParts()">
          <option value="">Todos</option>
          <option value="ganador">Ganadores</option>
          <option value="participante">Sin premio</option>
          <option value="nojugo">Sin jugar</option>
          <option value="pendiente">Pendientes entrega</option>
          <option value="entregado">Entregados</option>
        </select>
        <button class="btn btn-ghost" onclick="loadParts()">🔄</button>
      </div>
      <div id="parts-list"></div>
    </div>

    <!-- INVENTARIO -->
    <div class="panel" id="p-inv">
      <div class="panel-title">INVENTARIO DE PREMIOS</div>
      <div class="inv-toolbar">
        <button class="btn btn-primary" onclick="openNewPrize()">+ Nuevo premio</button>
        <button class="btn btn-ghost" onclick="loadInventory()">🔄 Actualizar</button>
      </div>
      <div id="inv-list"></div>
    </div>
  </div>
</div>

<!-- MODAL: Premio -->
<div class="modal-bg" id="prize-modal">
  <div class="modal">
    <h3 id="pm-h">Nuevo Premio</h3>
    <input type="hidden" id="pm-id">
    <div class="fg"><label>Nombre</label><input type="text" id="pm-name" placeholder="Ej: Premio"></div>
    <div class="fg"><label>Cantidad total</label><input type="number" id="pm-total" placeholder="Ej: 20" min="0"></div>
    <div class="fg" id="pm-rest-wrap" style="display:none">
      <label>Cantidad restante</label>
      <input type="number" id="pm-rest" placeholder="Ej: 18" min="0">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closePM()">Cancelar</button>
      <button class="btn btn-gold"  onclick="savePrize()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL: Confirmar -->
<div class="modal-bg" id="confirm-modal">
  <div class="modal">
    <h3 id="cm-title">¿Confirmar?</h3>
    <p id="cm-msg" style="font-size:14px;color:rgba(255,255,255,.65);line-height:1.6;margin-bottom:4px"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost"   onclick="closeCM()">Cancelar</button>
      <button class="btn btn-danger"  id="cm-ok">Confirmar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';
// SUPABASE_URL, SUPABASE_ANON y _sb vienen de config.js

const ST={ session:null, parts:[], prizes:[] };

// ══ LOGIN ══
async function aLogin(){
  const email=document.getElementById('au').value.trim();
  const pass= document.getElementById('ap').value;
  document.getElementById('lerr').textContent='';
  const {data,error}=await _sb.auth.signInWithPassword({email,password:pass});
  if(error||!data.session){ document.getElementById('lerr').textContent='Credenciales incorrectas.'; return; }
  ST.session=data.session;
  document.getElementById('sb-email').textContent=email;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='flex';
  initApp();
}
async function aOut(){
  await _sb.auth.signOut(); ST.session=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('main-app').style.display='none';
}
document.addEventListener('keydown',e=>{ if(e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none') aLogin(); });

// ══ PAUSA DE LA DINÁMICA ══
let dinamicaPausada = false;

async function loadPauseState(){
  const {data} = await _sb.from('config_evento').select('pausado').eq('id',1).single();
  dinamicaPausada = data?.pausado === true;
  renderPauseUI();
}

function renderPauseUI(){
  const statusEl = document.getElementById('pause-status');
  const btnEl = document.getElementById('btn-pause');
  if(dinamicaPausada){
    statusEl.className='badge badge-red';
    statusEl.textContent='🔴 Dinámica pausada';
    btnEl.textContent='▶ Reanudar dinámica';
    btnEl.classList.remove('btn-danger'); btnEl.classList.add('btn-primary');
  } else {
    statusEl.className='badge badge-green';
    statusEl.textContent='🟢 Dinámica activa';
    btnEl.textContent='⏸ Pausar dinámica';
    btnEl.classList.remove('btn-primary'); btnEl.classList.add('btn-danger');
  }
}

async function togglePause(){
  const next = !dinamicaPausada;
  const {error} = await _sb.rpc('set_pausa',{p_pausado:next});
  if(error){ toast('❌ Error al cambiar el estado'); return; }
  dinamicaPausada = next;
  renderPauseUI();
  toast(next ? '⏸ Dinámica pausada — nadie podrá ganar hasta reanudar' : '▶ Dinámica reanudada');
}

// ══ INIT ══
async function initApp(){
  await Promise.all([loadDash(),loadParts(),loadInventory(),loadPauseState()]);
  subscribeRT();
}

// ══ TABS ══
const TABS={ dash:'p-dash', parts:'p-parts', inv:'p-inv' };
const TITLES={ dash:'Dashboard', parts:'Participantes', inv:'Inventario de Premios' };
function switchTab(key,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById(TABS[key]).classList.add('on');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('a'));
  if(btn) btn.classList.add('a');
  document.getElementById('topbar-title').textContent=TITLES[key];
}

// ══ DASHBOARD ══
async function loadDash(){
  const [
    {count:total},
    {count:wins},
    {count:dlv},
    {count:pend},
    {data:inv},
    {data:recent},
  ] = await Promise.all([
    _sb.from('participantes').select('*',{count:'exact',head:true}),
    _sb.from('participantes').select('*',{count:'exact',head:true}).eq('resultado','ganador'),
    _sb.from('participantes').select('*',{count:'exact',head:true}).eq('premio_entregado',true),
    _sb.from('participantes').select('*',{count:'exact',head:true}).eq('resultado','ganador').eq('premio_entregado',false),
    _sb.from('premios').select('*').order('creado_en'),
    _sb.from('participantes').select('nombre,codigo,fecha_juego').eq('resultado','ganador').order('fecha_juego',{ascending:false}).limit(5),
  ]);

  const invTot=inv?.reduce((s,p)=>s+p.cantidad_total,0)??0;
  const invRest=inv?.reduce((s,p)=>s+p.cantidad_restante,0)??0;

  document.getElementById('dash-stats').innerHTML=`
    ${sc(total??0,'Participantes','hl-gold')}
    ${sc(wins??0,'🏆 Premios ganados','hl-green')}
    ${sc(dlv??0,'Entregados','')}
    ${sc(pend??0,'Pendientes entrega','hl-red')}
    ${sc(invRest,'Premios disponibles','hl-green')}
    ${sc(invTot,'Inventario total','')}
  `;

  // Bar chart
  document.getElementById('dash-inv-bars').innerHTML=(inv||[]).map(p=>{
    const pct=p.cantidad_total>0?Math.round(p.cantidad_restante/p.cantidad_total*100):0;
    return `<div class="inv-bar-row">
      <div class="ibr-label">${esc(p.nombre_premio)}</div>
      <div class="ibr-track"><div class="ibr-fill" style="width:${pct}%"></div></div>
      <div class="ibr-num">${p.cantidad_restante}/${p.cantidad_total} <span class="badge ${p.activo?'badge-green':'badge-gray'}">${p.activo?'ON':'OFF'}</span></div>
    </div>`;
  }).join('')||'<div class="empty-state">Sin premios registrados</div>';

  // Recent winners
  document.getElementById('dash-recent').innerHTML=(recent||[]).map(p=>`
    <div class="pc win" style="margin-bottom:8px">
      <div class="pc-head"><div class="pc-name">${esc(p.nombre)}</div><div class="pc-code">${p.codigo}</div></div>
      <div class="pc-info">🗓 ${p.fecha_juego?new Date(p.fecha_juego).toLocaleString('es-MX'):'—'}</div>
      <span class="badge badge-gold">🏆 Ganador</span>
    </div>
  `).join('')||'<div class="empty-state">Sin ganadores aún</div>';
}

function sc(num,lbl,cls){ return `<div class="scard ${cls}"><div class="snum">${num}</div><div class="slbl">${lbl}</div></div>`; }

// ══ PARTICIPANTES ══
async function loadParts(){
  const {data}=await _sb.from('participantes').select('*').order('fecha_registro',{ascending:false});
  ST.parts=data||[]; renderParts();
}

function renderParts(){
  const q=(document.getElementById('srch')?.value||'').toLowerCase();
  const f=document.getElementById('filtro')?.value||'';
  let list=ST.parts;
  if(q) list=list.filter(p=>
    p.nombre.toLowerCase().includes(q)||p.codigo.toLowerCase().includes(q)||
    (p.telefono||'').includes(q)||(p.correo||'').toLowerCase().includes(q));
  if(f==='ganador')    list=list.filter(p=>p.resultado==='ganador');
  if(f==='participante') list=list.filter(p=>p.resultado==='participante');
  if(f==='nojugo')     list=list.filter(p=>!p.jugó);
  if(f==='pendiente')  list=list.filter(p=>p.resultado==='ganador'&&!p.premio_entregado);
  if(f==='entregado')  list=list.filter(p=>p.premio_entregado);

  const el=document.getElementById('parts-list');
  if(!list.length){ el.innerHTML='<div class="empty-state">Sin resultados</div>'; return; }

  el.innerHTML=list.map(p=>{
    const dr=p.fecha_registro?new Date(p.fecha_registro).toLocaleString('es-MX'):'—';
    const dd=p.fecha_entrega?new Date(p.fecha_entrega).toLocaleString('es-MX'):'—';
    const badge=!p.resultado
      ?`<span class="badge badge-blue">Sin jugar</span>`
      :p.resultado==='ganador'
        ?p.premio_entregado?`<span class="badge badge-green">✅ Entregado</span>`:`<span class="badge badge-red">⏳ Pendiente</span>`
        :`<span class="badge badge-gray">Participante</span>`;
    const btn=p.resultado==='ganador'?`<button class="pc-btn" ${p.premio_entregado?'disabled':''} onclick="dlvPrize('${p.id}')">${p.premio_entregado?'✅ Premio entregado':'🎁 Marcar entregado'}</button>`:'';
    const prize=p.premio_asignado?`<br>🎁 <strong>${esc(p.premio_asignado)}</strong>`:'' ;
    return `<div class="pc ${p.resultado==='ganador'?'win':''} ${p.premio_entregado?'dlv':''}" id="pc-${p.id}">
      <div class="pc-head"><div class="pc-name">${esc(p.nombre)}</div><div class="pc-code">${p.codigo}</div></div>
      <div class="pc-info">📞 ${esc(p.telefono)} · 📧 ${esc(p.correo)}<br>🏠 ${esc(p.direccion)}<br>🗓 ${dr}${p.fecha_entrega?`<br>📦 Entrega: ${dd}`:''}${prize}</div>
      <div class="pc-badges">${badge}</div>
      ${btn}
    </div>`;
  }).join('');
}

async function dlvPrize(id){
  const p=ST.parts.find(x=>x.id===id);
  if(!p||p.premio_entregado){ toast('⚠️ Ya fue entregado'); return; }
  const {data:ok,error}=await _sb.rpc('entregar_premio',{p_participante_id:id});
  if(error||!ok){ toast('❌ Error'); return; }
  toast('✅ Premio marcado como entregado');
  await loadParts(); await loadDash();
}

// ══ INVENTARIO ══
async function loadInventory(){
  const {data}=await _sb.from('premios').select('*').order('creado_en');
  ST.prizes=data||[]; renderInventory();
}

function renderInventory(){
  const el=document.getElementById('inv-list');
  if(!ST.prizes.length){ el.innerHTML='<div class="empty-state">Sin premios. Crea el primero.</div>'; return; }
  el.innerHTML=ST.prizes.map(p=>{
    const tot=p.cantidad_total||0;
    const pctR=tot>0?Math.round(p.cantidad_restante/tot*100):0;
    const pctA=tot>0?Math.round(p.cantidad_asignada/tot*100):0;
    const canDel=p.cantidad_asignada===0;
    return `<div class="inv-card ${p.activo?'':'inactive'}" id="ic-${p.id}">
      <div class="inv-head">
        <div>
          <div class="inv-name">${esc(p.nombre_premio)}</div>
          <span class="badge ${p.activo?'badge-green':'badge-gray'}">${p.activo?'🟢 Activo':'⚫ Inactivo'}</span>
        </div>
        <div class="inv-actions">
          <button class="btn btn-ghost btn-sm" onclick="openEditPrize('${p.id}')">✏️</button>
          <button class="btn btn-ghost btn-sm" onclick="togglePrize('${p.id}',${p.activo})">${p.activo?'OFF':'ON'}</button>
          ${canDel?`<button class="btn btn-danger btn-sm" onclick="confirmDel('${p.id}','${esc(p.nombre_premio)}')">🗑</button>`:''}
        </div>
      </div>
      <div class="inv-stats">
        <div class="istat"><div class="istat-num">${p.cantidad_total}</div><div class="istat-lbl">Total</div></div>
        <div class="istat"><div class="istat-num" style="color:var(--verde2)">${p.cantidad_restante}</div><div class="istat-lbl">Disponibles</div></div>
        <div class="istat"><div class="istat-num" style="color:var(--oro)">${p.cantidad_asignada}</div><div class="istat-lbl">Asignados</div></div>
        <div class="istat"><div class="istat-num" style="color:var(--rl)">${p.cantidad_entregada}</div><div class="istat-lbl">Entregados</div></div>
      </div>
      <div class="prog-wrap"><div class="prog green" style="width:${pctR}%"></div></div>
      <div style="font-size:11px;color:var(--text-dim)">${pctR}% disponible · ${pctA}% asignado</div>
    </div>`;
  }).join('');
}

function openNewPrize(){
  document.getElementById('pm-h').textContent='Nuevo Premio';
  document.getElementById('pm-id').value='';
  document.getElementById('pm-name').value='';
  document.getElementById('pm-total').value='';
  document.getElementById('pm-rest-wrap').style.display='none';
  document.getElementById('prize-modal').classList.add('on');
}
function openEditPrize(id){
  const p=ST.prizes.find(x=>x.id===id); if(!p) return;
  document.getElementById('pm-h').textContent='Editar Premio';
  document.getElementById('pm-id').value=p.id;
  document.getElementById('pm-name').value=p.nombre_premio;
  document.getElementById('pm-total').value=p.cantidad_total;
  document.getElementById('pm-rest').value=p.cantidad_restante;
  document.getElementById('pm-rest-wrap').style.display='block';
  document.getElementById('prize-modal').classList.add('on');
}
function closePM(){ document.getElementById('prize-modal').classList.remove('on'); }

async function savePrize(){
  const id=document.getElementById('pm-id').value;
  const name=document.getElementById('pm-name').value.trim();
  const total=parseInt(document.getElementById('pm-total').value);
  const rest=parseInt(document.getElementById('pm-rest').value||document.getElementById('pm-total').value);
  if(!name){ toast('Ingresa el nombre'); return; }
  if(isNaN(total)||total<0){ toast('Cantidad inválida'); return; }
  if(id){
    const {error}=await _sb.from('premios').update({
      nombre_premio:name,
      cantidad_total:total,
      cantidad_restante:Math.max(0,isNaN(rest)?0:rest),
      cantidad_asignada:Math.max(0,total-(isNaN(rest)?0:rest)),
    }).eq('id',id);
    if(error){ toast('❌ Error'); return; }
    toast('✅ Actualizado');
  } else {
    const {error}=await _sb.from('premios').insert({
      nombre_premio:name,cantidad_total:total,cantidad_restante:total,
      cantidad_asignada:0,cantidad_entregada:0,activo:true
    });
    if(error){ toast('❌ Error'); return; }
    toast('✅ Premio creado');
  }
  closePM(); await loadInventory(); await loadDash();
}

async function togglePrize(id,cur){
  await _sb.from('premios').update({activo:!cur}).eq('id',id);
  toast(cur?'⚫ Desactivado':'🟢 Activado');
  await loadInventory(); await loadDash();
}

function confirmDel(id,name){
  document.getElementById('cm-title').textContent='Eliminar premio';
  document.getElementById('cm-msg').textContent=`¿Eliminar "${name}"? Esta acción no se puede deshacer.`;
  document.getElementById('cm-ok').onclick=()=>deletePrize(id);
  document.getElementById('confirm-modal').classList.add('on');
}
function closeCM(){ document.getElementById('confirm-modal').classList.remove('on'); }
async function deletePrize(id){
  closeCM();
  const p=ST.prizes.find(x=>x.id===id);
  if(p?.cantidad_asignada>0){ toast('❌ No se puede eliminar: tiene asignaciones'); return; }
  await _sb.from('premios').delete().eq('id',id);
  toast('🗑 Eliminado'); await loadInventory(); await loadDash();
}

// ══ REALTIME ══
function subscribeRT(){
  _sb.channel('admin-rt')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'participantes'},async()=>{
      await loadParts(); await loadDash();
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'participantes'},async(pl)=>{
      const idx=ST.parts.findIndex(p=>p.id===pl.new.id);
      if(idx!==-1){ ST.parts[idx]=pl.new; renderParts(); } else await loadParts();
      await loadDash();
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'premios'},async()=>{
      await loadInventory(); await loadDash();
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'config_evento'},(pl)=>{
      dinamicaPausada = pl.new.pausado === true;
      renderPauseUI();
    })
    .subscribe();
}

// ══ EXCEL EXPORT ══
async function exportExcel(){
  if(typeof XLSX==='undefined'){ toast('❌ XLSX no disponible'); return; }
  toast('📊 Preparando…');
  const [{data:parts},{data:prizes}]=await Promise.all([
    _sb.from('participantes').select('*').order('fecha_registro'),
    _sb.from('premios').select('*').order('creado_en'),
  ]);
  const pData=(parts||[]).map(p=>({
    'Nombre':p.nombre,'Teléfono':p.telefono,'Correo':p.correo,
    'Dirección':p.direccion,'Acepta contacto':p.acepta_contacto?'Sí':'No',
    'Código':p.codigo,
    'Resultado':p.resultado==='ganador'?'Ganador':p.resultado==='participante'?'Participante':'Sin jugar',
    'Premio asignado':p.premio_asignado||'—',
    'Premio entregado':p.premio_entregado?'Sí':'No',
    'Fecha registro':p.fecha_registro?new Date(p.fecha_registro).toLocaleString('es-MX'):'—',
    'Fecha entrega':p.fecha_entrega?new Date(p.fecha_entrega).toLocaleString('es-MX'):'—',
  }));
  const iData=(prizes||[]).map(p=>({
    'Premio':p.nombre_premio,'Total':p.cantidad_total,
    'Disponibles':p.cantidad_restante,'Asignados':p.cantidad_asignada,
    'Entregados':p.cantidad_entregada,'Activo':p.activo?'Sí':'No',
  }));
  const wb=XLSX.utils.book_new();
  const ws1=XLSX.utils.json_to_sheet(pData);
  const ws2=XLSX.utils.json_to_sheet(iData);
  ws1['!cols']=[{wch:24},{wch:14},{wch:28},{wch:30},{wch:14},{wch:10},{wch:12},{wch:18},{wch:16},{wch:22},{wch:22}];
  ws2['!cols']=[{wch:20},{wch:8},{wch:12},{wch:12},{wch:12},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws1,'Participantes');
  XLSX.utils.book_append_sheet(wb,ws2,'Inventario');
  XLSX.writeFile(wb,`MxKorea_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('✅ Excel exportado');
}

// ══ HELPERS ══
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg,ms=2800){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),ms);
}
</script>
